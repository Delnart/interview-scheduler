server {
    listen 80;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    # Don't leak the nginx version
    server_tokens off;

    # Basic security headers (the React app is static; the API sets its own via helmet)
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-Frame-Options "DENY" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;

    # Cache hashed build assets aggressively; never cache index.html
    location /assets/ {
        expires 1y;
        add_header Cache-Control "public, immutable";
        try_files $uri =404;
    }

    # Proxy API calls to the backend container. Because the browser hits the API
    # on the same origin, no CORS round-trip is needed in this deployment.
    location /api/ {
        proxy_pass http://backend:4000;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 60s;
    }

    # SPA fallback: serve index.html for any client-side route
    location / {
        try_files $uri $uri/ /index.html;
    }
}
