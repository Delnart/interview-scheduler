databases:
  - name: interview-db
    plan: free
    databaseName: interview
    user: app

services:
  # --- Backend API ---
  - type: web
    name: interview-api
    runtime: node
    plan: free
    rootDir: backend
    buildCommand: npm install
    startCommand: npm start
    healthCheckPath: /api/health
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: interview-db
          property: connectionString
      - key: DATABASE_SSL
        value: "false" # internal Render DB connection does not use SSL
      - key: NODE_ENV
        value: production
      - key: JWT_SECRET
        generateValue: true # Render generates a strong random value
      - key: JWT_EXPIRES_IN
        value: "12h"
      - key: ADMIN_EMAIL
        value: admin@example.com
      - key: ADMIN_PASSWORD
        sync: false
      - key: DEFAULT_RECRUITER_PASSWORD
        sync: false
      - key: FRONTEND_URL
        sync: false # set to your static site URL after first deploy
      - key: GOOGLE_CLIENT_ID
        sync: false
      - key: GOOGLE_CLIENT_SECRET
        sync: false
      - key: GOOGLE_REDIRECT_URI
        sync: false
      - key: GOOGLE_SHEETS_ID
        sync: false
      - key: GOOGLE_SERVICE_ACCOUNT_KEY
        sync: false
      - key: GOOGLE_SHEETS_RANGE
        sync: false
      - key: TELEGRAM_BOT_TOKEN
        sync: false
      - key: TELEGRAM_CHAT_ID
        sync: false
      - key: TIMEZONE
        value: Europe/Kyiv

  # --- Frontend (static) ---
  - type: web
    name: interview-web
    runtime: static
    rootDir: frontend
    buildCommand: npm install && npm run build
    staticPublishPath: dist
    routes:
      - type: rewrite
        source: /api/*
        destination: https://interview-api-letj.onrender.com/api/*
      - type: rewrite
        source: /*
        destination: /index.html
